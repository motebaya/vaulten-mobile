name: Build + Tag + Release (on push main)

on:
  push:
    branches: ["main"]

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from build.gradle.kts
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep -E 'versionName\s*=' app/build.gradle.kts \
            | head -1 \
            | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep -E 'versionCode\s*=' app/build.gradle.kts \
            | head -1 \
            | sed 's/[^0-9]//g')
          TAG="v${VERSION}"
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "versionCode=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"               >> "$GITHUB_OUTPUT"
          echo "Computed tag: $TAG  (versionName=$VERSION, versionCode=$VERSION_CODE)"

      - name: Check if tag already exists
        id: tagcheck
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags
          if git rev-parse "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag already exists -> skipping build/release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag does not exist -> will build/release."
          fi

      - name: Stop if already released
        if: steps.tagcheck.outputs.exists == 'true'
        shell: bash
        run: echo "Nothing to do."

      # ── Environment ──────────────────────────────────────────────

      - name: Setup Java 17
        if: steps.tagcheck.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        if: steps.tagcheck.outputs.exists == 'false'
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle
        if: steps.tagcheck.outputs.exists == 'false'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Signing ───────────────────────────────────────────────────

      - name: Decode and write keystore
        if: steps.tagcheck.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > vaulten-release.jks

      - name: Write keystore.properties
        if: steps.tagcheck.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail
          cat > keystore.properties <<EOF
          storeFile=vaulten-release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      # ── Build ─────────────────────────────────────────────────────

      - name: Build release APKs (split per-ABI + universal)
        if: steps.tagcheck.outputs.exists == 'false'
        run: ./gradlew assembleRelease --no-daemon

      # ── Collect artifacts ─────────────────────────────────────────

      - name: Collect & rename APKs
        if: steps.tagcheck.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.ver.outputs.version }}"
          APKDIR="app/build/outputs/apk/release"
          OUTDIR="dist"
          mkdir -p "$OUTDIR"

          # Per-ABI outputs: app-<abi>-release.apk -> vaulten-<abi>-<version>.apk
          for abi in armeabi-v7a arm64-v8a x86_64; do
            src="${APKDIR}/app-${abi}-release.apk"
            if [[ -f "$src" ]]; then
              dst="${OUTDIR}/vaulten-${abi}-${VERSION}.apk"
              cp -v "$src" "$dst"
            else
              echo "::warning::File not found: $src"
            fi
          done

          # Universal output: app-universal-release.apk -> vaulten-universal-<version>.apk
          src="${APKDIR}/app-universal-release.apk"
          if [[ -f "$src" ]]; then
            dst="${OUTDIR}/vaulten-universal-${VERSION}.apk"
            cp -v "$src" "$dst"
          else
            echo "::warning::File not found: $src"
          fi

          echo "── Artifacts ──"
          ls -lh "$OUTDIR"

      # ── Release ───────────────────────────────────────────────────

      - name: Create and push tag
        if: steps.tagcheck.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release + upload artifacts
        if: steps.tagcheck.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Vaulten ${{ steps.ver.outputs.tag }}
          body_path: releases/${{ steps.ver.outputs.version }}.md
          files: dist/*.apk
